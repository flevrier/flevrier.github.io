name: build-site

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: install python deps
        run: pip install requests

      - name: fetch latest ADS publication
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: |
          sed -i "s/<<<ADS_TOKEN>>>/$ADS_TOKEN/" scripts/fetch_latest_ads.py
          python scripts/fetch_latest_ads.py

      - name: render site
        run: quarto render

      - name: publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages