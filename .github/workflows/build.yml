name: build-site

on:
  push:
    branches: main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: install python deps
        run: pip install requests bibtexparser

      - name: generate latest publication json
        run: python scripts/latest_from_bib.py

      - name: render site
        run: quarto render

      - name: publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}